name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_BACK_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.EC2_FRONT_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_BACK_HOST }} "
            set -e
            cd ~/BigParcial
            git pull --ff-only
            cd backend
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart chinook-backend
          "

      - name: Deploy frontend
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_FRONT_HOST }} "
            set -e
            cd ~/BigParcial
            git pull --ff-only
            cd frontend
            echo 'VITE_API_URL=/api' > .env
            npm ci
            npm run build
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            sudo systemctl restart nginx
          "
